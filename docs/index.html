<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca Digital - DGE Mendoza</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --text: #f8fafc;
      --text-secondary: #94a3b8;
      --accent: #f59e0b;
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    a { color: inherit; text-decoration: none; }

    /* Header */
    .header-banner {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #1e40af 100%);
      padding: 3rem 2rem 3rem;
      text-align: center;
      position: relative;
    }
    .header-banner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.3;
    }
    .header-content { position: relative; z-index: 100; }
    .header-banner h1 { font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .header-banner p { font-size: 1.125rem; color: rgba(255,255,255,0.85); max-width: 600px; margin: 0 auto; }
    .header-badge { display: inline-block; background: var(--accent); color: #0f172a; padding: 0.25rem 1rem; border-radius: 20px; font-size: 0.875rem; font-weight: 700; margin-bottom: 1rem; }

    /* Search */
    .search-container { margin-top: 1.5rem; position: relative; z-index: 1001; }
    .search-input { width: 100%; max-width: 500px; padding: 0.875rem 1.25rem 0.875rem 2.75rem; border-radius: 30px; border: none; font-size: 1rem; background: rgba(255,255,255,0.15); color: white; outline: none; }
    .search-input::placeholder { color: rgba(255,255,255,0.6); }
    .search-input:focus { background: rgba(255,255,255,0.2); }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 1.25rem; }
    .search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border-radius: var(--radius); margin-top: 0.5rem; max-height: 400px; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 1000; }
    .search-result-item { padding: 0.75rem 1rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; gap: 0.75rem; align-items: center; }
    .search-result-item:hover { background: var(--surface2); }
    .search-result-item img { width: 40px; height: 55px; object-fit: cover; border-radius: 4px; }
    .search-result-info { flex: 1; }
    .search-result-title { font-weight: 600; font-size: 0.9375rem; }
    .search-result-type { font-size: 0.75rem; color: var(--text-secondary); }
    .no-results { padding: 1rem; text-align: center; color: var(--text-secondary); }

    /* Main container */
    .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
    .section { padding: 2rem 0; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-title { font-size: 1.375rem; font-weight: 700; }
    .section-link { font-size: 0.875rem; color: var(--primary); font-weight: 600; }
    .section-link:hover { text-decoration: underline; }
    .section-desc { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 1.5rem; }

    /* Featured book */
    .featured { margin: 2rem 0; }
    .featured-card {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 2rem;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
    }
    @media (max-width: 600px) {
      .featured-card { grid-template-columns: 1fr; }
      .featured-image { width: 100%; height: 250px; }
    }
    .featured-image {
      width: 200px;
      height: 280px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      background: var(--surface2);
    }
    .featured-info { display: flex; flex-direction: column; justify-content: center; }
    .featured-badge { display: inline-block; background: var(--accent); color: #0f172a; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; width: fit-content; }
    .featured-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .featured-excerpt { font-size: 0.9375rem; color: var(--text-secondary); margin-bottom: 0.75rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .featured-note { font-size: 0.8125rem; color: var(--text-secondary); background: rgba(245,158,11,0.1); padding: 0.5rem 0.75rem; border-radius: var(--radius-xs); margin-bottom: 1rem; border-left: 3px solid var(--accent); }
    .featured-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .btn { padding: 0.625rem 1.25rem; border-radius: var(--radius-sm); font-weight: 600; font-size: 0.875rem; cursor: pointer; border: none; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--surface2); color: white; }
    .btn-secondary:hover { background: #475569; }

    /* Carousel */
    .carousel { position: relative; }
    .carousel-track {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 1rem;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }
    .carousel-track::-webkit-scrollbar { height: 6px; }
    .carousel-track::-webkit-scrollbar-track { background: transparent; }
    .carousel-track::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
    .carousel-card {
      flex-shrink: 0;
      width: 160px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .carousel-card:hover { transform: scale(1.05); }
    .carousel-cover {
      width: 160px;
      height: 220px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      background: var(--surface);
      margin-bottom: 0.5rem;
    }
    .carousel-title { font-size: 0.8125rem; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
    .carousel-meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }

    /* Footer */
    .footer-explore {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .footer-explore .btn { font-size: 1rem; padding: 0.875rem 2rem; }
    .footer-explore p { font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.5rem; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; min-height: 300px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--surface2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="header-banner">
    <div class="header-content">
      <div class="header-badge">📚 Nueva Biblioteca Digital</div>
      <h1>Biblioteca Digital</h1>
      <p>Libros y recursos para explorar nuevas historias, fortalecer la alfabetización y la cultura en cada etapa de la vida.</p>
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar libros, recursos, temas..." oninput="handleSearch(this.value)">
        <div class="search-results hidden" id="searchResults"></div>
      </div>
    </div>
  </div>

  <main class="container">
    <div id="app">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </main>

  <div class="footer-explore">
    <button class="btn btn-primary" onclick="window.location.href='index.html'">🔍 Explorar todos los recursos</button>
    <p>495 recursos disponibles en la Biblioteca Digital DGE</p>
    <div style="margin-top:1.5rem;display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="https://www.mendoza.edu.ar" target="_blank" class="btn btn-secondary" style="display:inline-flex;align-items:center;gap:0.5rem;">
        🌐 Visitar sitio principal DGE Mendoza
      </a>
      <a href="admin.html" class="btn btn-secondary" style="display:inline-flex;align-items:center;gap:0.5rem;">
        ⚙️ Admin
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script>
    const CONFIG = { dataPath: './material-json/' };

    const SECTIONS = [
      { key: 'leamos-juntos', title: 'Leamos Juntos', desc: 'Recursos para promover la lectura en familia y en la escuela.', slugs: ['pequenos-lectores', 'grandes-lectores'] },
      { key: 'fluidez', title: 'Fluidez Lectora', desc: 'Subdividido en Primaria, Secundaria e Informes.', slugs: ['recursos-fluidez-lectora'] },
      { key: 'alfabetizacion', title: 'Programa Provincial de Alfabetización', desc: 'Klofky en la Tele, Sonidos y Letras en Acción, Juegos y Recursos.', slugs: ['recursos-de-alfabetizacion'] },
      { key: 'puentes', title: 'Puentes de Lectura', desc: 'Material organizado por grado (1° a 7°).', slugs: ['puentes-de-lectura'] },
      { key: 'palabras', title: 'Palabras que cuentan la Historia', desc: 'Textos que construyen identidad y memoria colectiva.', slugs: ['texto-literarios'] },
    ];

    let allPosts = [];
    let lecturaIndex = {};
    let fuse = null;

    function initSearch() {
      const options = {
        keys: ['title', 'lectura.name', 'content_text'],
        threshold: 0.4,
        includeScore: true,
        minMatchCharLength: 2
      };
      fuse = new Fuse(allPosts, options);
    }

    function handleSearch(query) {
      const resultsDiv = document.getElementById('searchResults');
      if (!query || query.length < 2) {
        resultsDiv.classList.add('hidden');
        return;
      }
      
      const results = fuse.search(query).slice(0, 10);
      
      if (results.length === 0) {
        resultsDiv.innerHTML = '<div class="no-results">No se encontraron resultados</div>';
      } else {
        resultsDiv.innerHTML = results.map(r => {
          const post = r.item;
          const img = post.featured_image_url || 'https://www.mendoza.edu.ar/wp-content/uploads/2026/04/defecto-sin-destacadas.png';
          const type = post.lectura && post.lectura.length ? post.lectura[0].name : '';
          return `<div class="search-result-item" onclick="renderDetailBySlug('${post.slug}'); document.getElementById('searchResults').classList.add('hidden');">
            <img src="${img}" alt="">
            <div class="search-result-info">
              <div class="search-result-title">${escapeHtml(post.title)}</div>
              <div class="search-result-type">${type}</div>
            </div>
          </div>`;
        }).join('');
      }
      resultsDiv.classList.remove('hidden');
    }

    function renderCategory(key) {
      const section = SECTIONS.find(s => s.key === key);
      if (!section) return;
      
      const posts = getPostsForSlugs(section.slugs);
      const app = document.getElementById('app');
      
      let html = `<div style="max-width:1200px;margin:0 auto;padding:2rem;">
        <button class="btn btn-secondary" onclick="render()" style="margin-bottom:1.5rem;">← Volver</button>
        <h1 style="font-size:2rem;margin-bottom:0.5rem;">${section.title}</h1>
        <p style="color:#94a3b8;margin-bottom:1.5rem;">${section.desc}</p>
        <p style="margin-bottom:2rem;color:#94a3b8;">${posts.length} recursos disponibles</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1.5rem;">`;
      
      posts.forEach(post => {
        const img = post.featured_image_url || 'https://www.mendoza.edu.ar/wp-content/uploads/2026/04/defecto-sin-destacadas.png';
        html += `<div class="carousel-card" onclick="renderDetailBySlug('${post.slug}')">
          <img class="carousel-cover" src="${img}" alt="${escapeHtml(post.title)}" loading="lazy">
          <div class="carousel-title">${escapeHtml(post.title)}</div>
          <div class="carousel-meta">📅 ${new Date(post.date).toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'})}</div>
        </div>`;
      });
      
      html += `</div></div>`;
      app.innerHTML = html;
      window.scrollTo(0, 0);
    }

    async function loadData() {
      const indexRes = await fetch(CONFIG.dataPath + 'index.json');
      const index = await indexRes.json();

      const postFiles = index.files.posts;
      const postResponses = await Promise.all(postFiles.map(f => fetch(CONFIG.dataPath + f)));
      const postContents = await Promise.all(postResponses.map(r => r.json()));
      allPosts = postContents.flat();

      const lecturaRes = await fetch(CONFIG.dataPath + index.files.lectura);
      lecturaIndex = await lecturaRes.json();

      initSearch();
      render();
    }

    function getPostsForSlugs(slugs) {
      const postIds = new Set();
      slugs.forEach(slug => {
        if (lecturaIndex[slug] && lecturaIndex[slug].ids) {
          lecturaIndex[slug].ids.forEach(id => postIds.add(id));
        }
      });
      return allPosts.filter(p => postIds.has(p.id));
    }

    function getFirstPostForSection(slugs) {
      const posts = getPostsForSlugs(slugs);
      return posts[0] || null;
    }

    function getPostsForCarousel(slugs, excludeId) {
      const posts = getPostsForSlugs(slugs);
      return posts.filter(p => p.id !== excludeId).slice(0, 12);
    }

    function getTotalForSlugs(slugs) {
      let total = 0;
      slugs.forEach(slug => {
        if (lecturaIndex[slug]) total += lecturaIndex[slug].total_posts || 0;
      });
      return total;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render() {
      const app = document.getElementById('app');
      let html = '';

      // Featured book - check localStorage first, fallback to default
      let featured = null;
      const savedSlug = localStorage.getItem('featuredSlug');
      if (savedSlug) {
        featured = allPosts.find(p => p.slug === savedSlug) || getFirstPostForSection(['pequenos-lectores', 'grandes-lectores']);
      } else {
        featured = getFirstPostForSection(['pequenos-lectores', 'grandes-lectores']);
      }
      
      if (featured) {
        const img = featured.featured_image_url || 'https://www.mendoza.edu.ar/wp-content/uploads/2026/04/defecto-sin-destacadas.png';
        const lectura = featured.lectura && featured.lectura.length ? featured.lectura[0].name : 'Leamos Juntos';
        const excerpt = featured.content_text ? featured.content_text.substring(0, 200) + '...' : '';

        html += `<section class="featured">
          <div class="featured-card">
            <img class="featured-image" src="${img}" alt="${escapeHtml(featured.title)}" loading="lazy">
            <div class="featured-info">
              <span class="featured-badge">📖 Libro destacado del mes</span>
              <h2 class="featured-title">${escapeHtml(featured.title)}</h2>
              <p class="featured-excerpt">${escapeHtml(excerpt)}</p>
              <p class="featured-note">Selección del equipo DGE por su valor pedagógico y su contribución a la alfabetización.</p>
              <div class="featured-actions">
                <button class="btn btn-primary" onclick="renderDetailBySlug('${featured.slug}')">Leer online</button>
                ${featured.featured_image_url ? '<a href="' + featured.featured_image_url + '" target="_blank" class="btn btn-secondary">Descargar</a>' : ''}
              </div>
            </div>
          </div>
        </section>`;
      }

      // Carousel sections
      SECTIONS.forEach(section => {
        const posts = getPostsForCarousel(section.slugs, featured ? featured.id : null);
        const total = getTotalForSlugs(section.slugs);

        html += `<section class="section">
          <div class="section-header">
            <h2 class="section-title">${section.title}</h2>
            <a href="#" class="section-link" onclick="renderCategory('${section.key}')">Ver todos (${total}) →</a>
          </div>
          <p class="section-desc">${section.desc}</p>
          <div class="carousel">
            <div class="carousel-track">`;

        posts.forEach(post => {
          const img = post.featured_image_url || 'https://www.mendoza.edu.ar/wp-content/uploads/2026/04/defecto-sin-destacadas.png';
          html += `<div class="carousel-card" onclick="renderDetailBySlug('${post.slug}')">
            <img class="carousel-cover" src="${img}" alt="${escapeHtml(post.title)}" loading="lazy">
            <div class="carousel-title">${escapeHtml(post.title)}</div>
            <div class="carousel-meta">📅 ${new Date(post.date).toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'})}</div>
          </div>`;
        });

        html += `</div></div></section>`;
      });

      app.innerHTML = html;
    }

    // Routing
    function handleRoute() {
      const path = window.location.pathname;
      const slug = path.replace(/^\//, '').replace(/\/$/, '');
      if (slug && slug.startsWith('recurso/')) {
        const postSlug = slug.replace('recurso/', '').replace(/\/$/, '');
        const post = allPosts.find(p => p.slug === postSlug);
        if (post) renderDetail(post);
        else window.location.href = '/';
      } else {
        // Already rendered
      }
    }

    function renderDetail(post) {
      const app = document.getElementById('app');
      const img = post.featured_image_url || 'https://www.mendoza.edu.ar/wp-content/uploads/2026/04/defecto-sin-destacadas.png';
      const content = post.content_html_clean || '';
      const lectura = post.lectura && post.lectura.length ? post.lectura.map(t => t.name).join(', ') : '';

      app.innerHTML = `<div style="max-width:900px;margin:0 auto;padding:2rem;">
        <button class="btn btn-secondary" onclick="render()" style="margin-bottom:1.5rem;">← Volver</button>
        <h1 style="font-size:2rem;margin-bottom:0.5rem;">${escapeHtml(post.title)}</h1>
        <p style="color:#94a3b8;margin-bottom:1rem;">${lectura} • ${new Date(post.date).toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'})}</p>
        <img src="${img}" alt="${escapeHtml(post.title)}" style="width:100%;max-height:400px;object-fit:contain;margin-bottom:1.5rem;border-radius:12px;">
        <div style="font-size:1.0625rem;line-height:1.8;">${content}</div>
      </div>`;
      window.scrollTo(0, 0);
    }

    function renderDetailBySlug(slug) {
      const post = allPosts.find(p => p.slug === slug);
      if (post) renderDetail(post);
    }

    window.addEventListener('popstate', handleRoute);
    window.addEventListener('load', () => { loadData(); handleRoute(); });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-container')) {
        document.getElementById('searchResults').classList.add('hidden');
      }
    });
  </script>
</body>
</html>
